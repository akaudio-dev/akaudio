<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="40.64mm" height="128.5mm" viewBox="0 0 40.64 128.5">
  <defs>
    <!-- userSpaceOnUse spanning the full height — matches the core/Fundamental panel
         gradient exactly (NanoSVG mis-scales objectBoundingBox gradients). -->
    <linearGradient id="bg" x1="20.32" y1="0" x2="20.32" y2="128.5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ebebeb"/>
      <stop offset="1" stop-color="#e1e1e1"/>
    </linearGradient>
  </defs>
  <rect width="40.64" height="128.5" fill="url(#bg)"/>
</svg>
